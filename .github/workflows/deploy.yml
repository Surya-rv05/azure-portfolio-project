# =============================================
# Project 1 — Portfolio CI/CD Pipeline
# Author: Surya
# Description: Auto-deploy portfolio to Azure
#              Blob Storage on every push to main
# =============================================

name: Deploy Portfolio to Azure

# Trigger — runs on every push to main branch
on:
  push:
    branches:
      - main
  # Also allows manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Checkout the code
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # Step 2 — Login to Azure using our secret
      - name: 🔐 Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Step 3 — Enable static website hosting
      - name: ⚙️ Enable Static Website Hosting
        run: |
          az storage blob service-properties update \
            --account-name ${{ secrets.STORAGE_ACCOUNT_NAME }} \
            --static-website \
            --index-document index.html

      # Step 4 — Upload website files to Azure
      - name: 🚀 Deploy to Azure Blob Storage
        run: |
          az storage blob upload \
            --account-name ${{ secrets.STORAGE_ACCOUNT_NAME }} \
            --container-name '$web' \
            --name index.html \
            --file src/index.html \
            --content-type 'text/html' \
            --overwrite true

      # Step 5 — Print the live URL
      - name: 🌐 Print Live URL
        run: |
          echo "✅ Portfolio is live at:"
          az storage account show \
            --name ${{ secrets.STORAGE_ACCOUNT_NAME }} \
            --resource-group rg-portfolio-dev \
            --query primaryEndpoints.web \
            --output tsv