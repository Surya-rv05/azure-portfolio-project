# =============================================
# Project 1 — Portfolio CI/CD Pipeline
# Author: Surya
# Description: Auto-deploy portfolio to Azure
#              with Entra ID authentication
# =============================================

name: Deploy Portfolio to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔐 Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ⚙️ Enable Static Website Hosting
        run: |
          az storage blob service-properties update \
            --account-name ${{ secrets.STORAGE_ACCOUNT_NAME }} \
            --static-website \
            --index-document index.html \
            --auth-mode login

      - name: 🚀 Deploy to Azure Blob Storage
        run: |
          az storage blob upload \
            --account-name ${{ secrets.STORAGE_ACCOUNT_NAME }} \
            --container-name '$web' \
            --name index.html \
            --file src/index.html \
            --content-type 'text/html' \
            --overwrite true \
            --auth-mode login

      - name: 🌐 Print Live URL
        run: |
          echo "✅ Portfolio is live at:"
          az storage account show \
            --name ${{ secrets.STORAGE_ACCOUNT_NAME }} \
            --resource-group rg-portfolio-dev \
            --query primaryEndpoints.web \
            --output tsv